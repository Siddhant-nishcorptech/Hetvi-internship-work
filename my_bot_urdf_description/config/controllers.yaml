controller_node:
  ros__parameters:
    auto_level: true
    manual_control: false
    track_mode: false

stair_detection_node:
  ros__parameters:
    max_steps: 15
    max_range: 4.0
    min_range: 0.1
    publish_stair_cloud: true

voxel_fliter_node:
  ros__parameters:
    leaf_size: 0.03

controller_manager:
  ros__parameters:
  
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    wheel_controller:
      type: diff_drive_controller/DiffDriveController

    joint_controller:
      type: effort_controllers/JointGroupEffortController

wheel_controller:
  ros__parameters:
    left_wheel_names: 
      - "revolute_7"
    right_wheel_names:
      - "revolute_3"

    wheel_separation: 0.340
    wheel_radius: 0.099 
    cmd_vel_timeout: 0.5 
    publish_rate: 50.0
    base_frame_id: base_footprint
    use_stamped_vel: true

joint_controller:
  ros__parameters:
    joints:
      - "revolute_1"
      - "revolute_2"
      - "revolute_5"
      - "revolute_6"

    interface_name: effort