balance_controller:
  ros__parameters:
    # PID gains for pitch correction (maps to crank angle offset)
    pitch_pid:
      kp: 1.0
      ki: 0.01
      kd: 0.1

    # PID gains for roll correction (differential crank offset)
    roll_pid:
      kp: 1.0
      ki: 0.05
      kd: 0.3

    # Stair detection state machine thresholds
    stair_detection:
      pitch_threshold_deg: 8.0    # Enter stair mode when |pitch| > this
      entry_duration_s: 0.5       # Must exceed threshold for this long
      exit_threshold_deg: 3.0     # Exit stair mode when |pitch| < this
      exit_duration_s: 1.0        # Must be below threshold for this long

    # Behavior adjustments in stair mode
    stair_mode:
      speed_multiplier: 0.5       # Reduce track speed by this factor
      clearance_offset_rad: -0.08 # Additional crank offset for ground clearance
      roll_suppression: 0.3  
    # Controller limits
    max_crank_offset_rad: 0.35     # RAISED to 20° to match new MAX_CORR
    imu_roll_offset_rad: 0.0       # auto-calibrated at startup; override if needed
    control_rate_hz: 50.0
